<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trailback</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0e0e10;
            --surface: #18181c;
            --border: #2a2a30;
            --text-primary: #f0f0f2;
            --text-muted: #7a7a85;
            --green: #22c55e;
            --green-dim: rgba(34, 197, 94, 0.12);
            --accent: #6ee7b7;
        }

        body {
            width: 280px;
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'IBM Plex Sans', sans-serif;
            padding: 20px;
            user-select: none;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .logo {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.04em;
            color: var(--text-primary);
        }

        .logo span {
            color: var(--accent);
        }

        /* ── Status badge ── */
        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--green-dim);
            border: 1px solid rgba(34, 197, 94, 0.25);
            border-radius: 20px;
            padding: 4px 10px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(0.85);
            }
        }

        .status-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--green);
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 16px;
        }

        /* ── Section label ── */
        .section-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-family: 'IBM Plex Mono', monospace;
        }

        /* ── App pills ── */
        .pills {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .pill {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 6px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            transition: border-color 0.15s, color 0.15s;
        }

        .pill.connected {
            border-color: rgba(34, 197, 94, 0.3);
            color: var(--text-primary);
        }

        .pill .check {
            font-size: 10px;
            color: var(--green);
        }

        /* ── Dashboard button ── */
        .btn-dashboard {
            display: block;
            width: 100%;
            padding: 11px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
            letter-spacing: 0.01em;
        }

        .btn-dashboard:hover {
            background: #202026;
            border-color: #3a3a42;
            transform: translateY(-1px);
        }

        .btn-dashboard:active {
            transform: translateY(0);
        }

        .btn-dashboard .arrow {
            display: inline-block;
            margin-left: 6px;
            transition: transform 0.15s;
        }

        .btn-dashboard:hover .arrow {
            transform: translateX(3px);
        }

        /* ── Footer ── */
        .footer {
            margin-top: 14px;
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.04em;
        }
    </style>
</head>

<body>

    <!-- Header: logo + status -->
    <div class="header">
        <div class="logo">trail<span>back</span></div>
        <div class="status">
            <div class="status-dot"></div>
            <span class="status-label">Recording</span>
        </div>
    </div>

    <div class="divider"></div>

    <!-- Connected apps -->
    <div class="section-label">Connected Apps</div>
    <div class="pills">
        <div class="pill connected">
            <span class="check">✓</span>
            Gmail
        </div>
        <div class="pill connected">
            <span class="check">✓</span>
            Docs
        </div>
        <div class="pill connected">
            <span class="check">✓</span>
            Slack
        </div>
    </div>

    <!-- Open Dashboard button -->
    <a class="btn-dashboard" href="http://localhost:3000" target="_blank">
        Open Dashboard <span class="arrow">→</span>
    </a>



</body>

</html>
